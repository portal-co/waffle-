[package]
name = "portal-pc-waffle"
version = "0.4.1"
description = "Wasm Analysis Framework For Lightweight Experiments"
authors = ["Chris Fallin <chris@cfallin.org>","gkgoat"]
license = "Apache-2.0 WITH LLVM-exception"
edition = "2018"

[dependencies]
wasmparser = { version = "0.227", default-features = false, features = ["simd"] }
wasm-encoder = { version = "0.227", default-features = false }
anyhow = { version = "^1.0", default-features = false }
# structopt = "0.3"
log = { version = "0.4", default-features = false }
# env_logger = "0.11"

smallvec = { version = "1.13", default-features = false }
# rayon = "1.10"
# lazy_static = "1.4"
# libc = "0.2"
# addr2line = "0.21"

# For fuzzing only. Versions must match those in fuzz/Cargo.toml.
libfuzzer-sys = { version = "0.4", optional = true }
indexmap = { version = "2.2.2", default-features = false }
stacker = { version = "0.1.15", optional = true }
wasm-smith = { version = "0.202", optional = true }
paste = "1.0.15"
serde = { version = "1.0.204", features = ["derive"] }


either = "1.13.0"
arena-traits = "0.2.0"
ssa-traits = "0.2.0"
cfg-traits = "0.2.0"

cfg-traits-03 = {version="0.3.0-alpha.0",package="cfg-traits"}
ssa-traits-03 = {version="0.3.0-alpha.0",package="ssa-traits"}
lending-iterator = "0.1.7"
hashbrown = { version = "0.15.2", default-features = false, features = ["alloc", "default-hasher", "equivalent", "serde"] }

[dev-dependencies]
wat = "1.212.0"
env_logger = "0.11"

[features]
default = []
fuzzing = ["libfuzzer-sys", "wasm-smith"]
stacker = ["dep:stacker"]

[lib]
name = "waffle"
 
